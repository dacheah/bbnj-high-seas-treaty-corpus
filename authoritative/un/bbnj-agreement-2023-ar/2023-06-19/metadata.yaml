provenance_note: 'Authentic Arabic text recovered by OCR of the byte-exact official UN PDF (original.pdf),
  because the PDF''s embedded fonts carry no usable Unicode map (pdftotext/PyMuPDF yield ~30% wrong glyphs
  + RTL reordering). OCR via EasyOCR [''ar''] on 300-dpi PyMuPDF renders, assembled and normalised (capture/render_ocr_ar.py,
  clean_ar.py). Complete coverage: title, الديباجة (preamble), المادة ١–٧٦ (Articles 1–76), المرفق الأول/الثاني
  (Annexes I–II). text_fidelity=ocr_unverified: OCR carries residual errors (e.g. ف→9, الجزء→الجزع, stray
  punctuation); the byte-exact PDF remains authoritative. One of six equally authentic languages (Art.
  76).'
verification:
  status: second_engine_insufficient
  method: 'Verbatim verification ATTEMPTED (2026-07-11) by dual-OCR reconciliation, but NOT achieved. A second, independent OCR engine (Tesseract 5.5 ara, tessdata_best; capture/ocr_second_tesseract.py) was run over the byte-exact PDF and reconciled with the primary (EasyOCR) at word level (capture/reconcile_ocr.py; capture/ar-tesseract.txt). The two engines agree on only ~78% of words (vs ~98% for Chinese with the same method), because Tesseract Arabic is not accurate enough to act as a verbatim corroborator here - the disagreements are dominated by Tesseract errors, not primary errors. Completeness re-confirmed and no structural gaps were found (the large tesseract-only runs are its own weakness or alignment artifacts, and the flagged clause text is present in the primary). The reconciliation did surface one genuine primary error - the Article 4 heading had lost its numeral - now corrected (see corrections). Full verbatim verification of the Arabic text still needs a stronger second engine (e.g. a cloud OCR such as Google Vision or Azure Read).'
  reference: capture/ar-tesseract.txt (Tesseract ara second OCR)
  verified_by: Cowork (provenance-corpus-builder)
  verified_date: '2026-07-11'
  note: 'text_fidelity stays ocr_unverified: the second engine (Tesseract ara) was too weak (~78% word agreement) to verify EasyOCR to a verbatim standard. Completeness is verified; the byte-exact original.pdf remains authoritative. Recommended next step for a verbatim upgrade: a cloud-OCR second pass for Arabic.'
corrections:
- date: '2026-07-11'
  change: 'Fixed the Article 4 heading: the primary OCR had dropped the article number and split the title word (stored "al-madah al-istithna at" -> "al-madah 4 al-istithnaat", i.e. "Article 4  Exceptions"). Confirmed by the Tesseract second OCR and the neighbouring heading format (Article 3 / Article 5).'
  reference: capture/ar-tesseract.txt
  note: One clearly-confirmed structural error corrected; the remainder of the Arabic text stays ocr_unverified pending a stronger second-engine (cloud OCR) pass.
