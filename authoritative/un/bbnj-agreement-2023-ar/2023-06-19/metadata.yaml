provenance_note: 'Authentic Arabic text recovered by OCR of the byte-exact official UN PDF (original.pdf),
  because the PDF''s embedded fonts carry no usable Unicode map (pdftotext/PyMuPDF yield ~30% wrong glyphs
  + RTL reordering). OCR via EasyOCR [''ar''] on 300-dpi PyMuPDF renders, assembled and normalised (capture/render_ocr_ar.py,
  clean_ar.py). Complete coverage: title, الديباجة (preamble), المادة ١–٧٦ (Articles 1–76), المرفق الأول/الثاني
  (Annexes I–II). text_fidelity=ocr_unverified: OCR carries residual errors (e.g. ف→9, الجزء→الجزع, stray
  punctuation); the byte-exact PDF remains authoritative. One of six equally authentic languages (Art.
  76).'
verification:
  status: completeness_verified
  method: 'Extends the 2026-07-04 spot-check with a full completeness pass (2026-07-11). Completeness verified
    from the stored text: preamble (الديباجة), 76 article-heading lines (المادة 1 .. المادة 76), both Annexes
    (المرفق الأول / المرفق الثاني), and the authenticity clause; a rendered title page and a body page (UN p.8:
    Art. 8, Part II heading, Art. 9) were read directly and confirm the source. Residual OCR defects were found
    and are recorded rather than hidden - e.g. the Article 4 heading lost its numeral and split a word (stored
    "المادة الاستثناء ات" vs source "المادة 4 الاستثناءات"), plus RTL list-marker and punctuation artifacts.
    Full verbatim accuracy is NOT established: the text is OCR (EasyOCR, run off-environment), no Arabic-capable
    second OCR engine is available here (tesseract carries only eng/osd), and concrete OCR errors remain.
    text_fidelity remains ocr_unverified; the byte-exact original.pdf stays authoritative.'
