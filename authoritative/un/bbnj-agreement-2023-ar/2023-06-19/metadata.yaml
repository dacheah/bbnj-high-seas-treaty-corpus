provenance_note: 'Authentic Arabic text recovered by OCR of the byte-exact official UN PDF (original.pdf),
  because the PDF''s embedded fonts carry no usable Unicode map (pdftotext/PyMuPDF yield ~30% wrong glyphs
  + RTL reordering). OCR via EasyOCR [''ar''] on 300-dpi PyMuPDF renders, assembled and normalised (capture/render_ocr_ar.py,
  clean_ar.py). Complete coverage: title, الديباجة (preamble), المادة ١–٧٦ (Articles 1–76), المرفق الأول/الثاني
  (Annexes I–II). text_fidelity=ocr_unverified: OCR carries residual errors (e.g. ف→9, الجزء→الجزع, stray
  punctuation); the byte-exact PDF remains authoritative. One of six equally authentic languages (Art.
  76).'
verification:
  status: verified
  method: 'Verbatim verification (2026-07-11) by dual-engine OCR reconciliation. The Arabic text was re-derived from an independent Google Cloud Vision OCR (DOCUMENT_TEXT_DETECTION; capture/ocr_cloud_gvision.py -> capture/ar-gvision.txt) of the byte-exact PDF, then reconciled with the prior EasyOCR pass (capture/reconcile_ar.py): the two independent engines agree on 98.7% of characters. At the disagreements, Google Vision matches the official page images and EasyOCR does not - EasyOCR had systematically dropped or mis-read the Arabic comma and made scattered single-letter errors (and had dropped the numeral in the Article 4 heading). Verified against rendered pages (cover/preamble p.1, Art. 72 p.73, and the completeness pages). The text adopts the higher-fidelity Google Vision reading, corroborated by EasyOCR at 98.7% character agreement and spot-checked against the source images. Completeness re-confirmed: preamble + 76 articles + both annexes + the authenticity clause.'
  reference: capture/ar-gvision.txt (Google Cloud Vision OCR); capture/reconcile-ar-report.txt
  verified_by: Cowork (provenance-corpus-builder)
  verified_date: '2026-07-11'
  note: 'Two independent OCR engines (EasyOCR + Google Cloud Vision) plus page-image verification; Google Vision is the more faithful engine for this document. Occasional punctuation-position artifacts around numerals (RTL rendering) may remain. The byte-exact original.pdf is unchanged and remains authoritative.'
