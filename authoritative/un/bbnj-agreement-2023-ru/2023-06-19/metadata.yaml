provenance_note: 'Authentic Russian text from the byte-exact official UN PDF (original.pdf). The embedded
  font maps Cyrillic and punctuation to non-Unicode code points; recovered via a deterministic decode
  (Cyrillic offset +0x1D6 plus a digit/punctuation/guillemet map) implemented in scripts/pipelines.py
  (clean_lang "ru"), then normalised. Verified 2026-07-11 (see verification): a full-text substitution-residue
  scan is clean, the structure is complete, and rendered official-PDF pages were visually confirmed; two
  residual italic-font runs and the leaked page-number footers were repaired at the reproducible pipeline
  source (see corrections). Complete: Preamble (PREAMBLE) + Parts I-XII + Articles 1-76 + Annexes I-II.'
verification:
  status: verified
  method: 'Deterministic-decode verification (2026-07-11); both PDF extractors emit the same non-Unicode
    font codes, so no independent second extractor is possible. (1) Full-text scan for display-font
    substitution residue: zero unexpected characters and zero non-legit Latin tokens remain. (2) Completeness:
    Articles 1-76 present with no gaps, 12 Parts, both Annexes I-II, canonical Russian legal phrasing coherent.
    (3) Visual confirmation against rendered official-PDF pages (title p.1; Art. 13 with the defined identifier
    "BBNJ" p.13; Arts 75-76 authenticity clause p.71). The +0x1D6 offset is a global deterministic map, so
    per-location error is not a failure mode once the residue scan is clean.'
  reference: original.pdf (sha256:dcdc8b6b7a65590fb660ebf7892fba6662db2855db4e73ca106245bc29b0e0ce)
  verified_by: Cowork (provenance-corpus-builder)
