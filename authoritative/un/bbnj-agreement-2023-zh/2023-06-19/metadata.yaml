  rapidocr (PP-OCR) on 200-dpi page renders, assembled and normalised (capture/clean_zh.py). Complete
  coverage: title, 序言 (preamble), 第一–十二部分 (Parts I–XII), 第一–七十六条 (Articles 1–76), 附件一/二 (Annexes I–II).
  text_fidelity=ocr_unverified: OCR carries residual errors (e.g. 一/二 confusions and occasional line-order
  glitches in dense definition lists); the byte-exact PDF remains authoritative. Full verbatim audit pending
  (GAPS G-2c-audit). One of six equally authentic languages (Art. 76).'
verification:
  status: verified
  method: 'Verbatim verification (2026-07-11) by dual-OCR reconciliation. A second, independent OCR engine (Tesseract 5.5 chi_sim, tessdata_best; capture/ocr_second_tesseract.py) was run over the byte-exact PDF and reconciled character-by-character with the primary (rapidocr / PP-OCR) via capture/reconcile_ocr.py: 97.9% of characters agree between the two independent engines. Every disagreement was adjudicated. The primary had garbled Article 1 - the openings of definitions (yi),(wu),(qi),(shi-er),(shi-si) were dropped and replaced with noise, and one preamble recital opening was dropped - all reconstructed from the rendered official-PDF page images (see corrections); plus two stray single characters fixed. The remaining single-character disagreements were scanned exhaustively and are all second-engine (Tesseract) misreads with the primary correct; all extra insertions were Tesseract hallucinations. Completeness re-confirmed (preamble + 12 parts + 76 articles + 14 definitions + both annexes).'
  reference: capture/zh-tesseract.txt (Tesseract chi_sim second OCR); capture/pages_zh/ (rendered pages)
