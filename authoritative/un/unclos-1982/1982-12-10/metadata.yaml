provenance_note: 'The complete authentic English text of UNCLOS (1982) — the parent convention that the
  BBNJ Agreement implements — from the byte-exact official DOALOS PDF (original.pdf). Covers the Preamble,
  Parts I–XVII (Articles 1–320) and Annexes I–IX, plus the three Final Act annexes/resolutions carried
  in the official publication. Extracted with pdftotext -raw and normalised (capture/unclos/clean_unclos.py:
  table-of-contents removal, dot-leader/page-number stripping, reflow). The pdftotext -raw space-drop
  artifacts were fixed on 2026-07-04 by re-deriving from a PyMuPDF extraction (see corrections/verification);
  text_fidelity upgraded to extracted_verified. Ingested in full per design decision JC-2026-07-04-d;
  the BBNJ-relevant provisions (Part XV; Arts 287/298; the high-seas and Area regimes) are surfaced in
  the derived layer. Authentic in the six UN languages (English ingested).'
