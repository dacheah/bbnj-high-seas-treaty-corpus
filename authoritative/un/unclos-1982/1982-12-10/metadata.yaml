provenance_note: 'The complete authentic English text of UNCLOS (1982) — the parent convention that the
  BBNJ Agreement implements — from the byte-exact official DOALOS PDF (original.pdf). Covers the Preamble,
  Parts I–XVII (Articles 1–320) and Annexes I–IX, plus the three Final Act annexes/resolutions carried
  in the official publication. Extracted with pdftotext -raw and normalised (capture/unclos/clean_unclos.py:
  table-of-contents removal, dot-leader/page-number stripping, reflow). text_fidelity=extracted_unverified:
  the source''s dense 1982 typesetting leaves residual space-drop artifacts (e.g. ''newregime''); a verbatim
  audit is a queued follow-up. Ingested in full per design decision JC-2026-07-04-d; the BBNJ-relevant
  provisions (Part XV; Arts 287/298; the high-seas and Area regimes) are surfaced in the derived layer.
  Authentic in the six UN languages (English ingested).'
