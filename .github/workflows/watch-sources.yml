name: watch-sources
on:
  schedule: [{ cron: "0 6 1 * *" }]   # monthly (Phase 2). Run more often in Phase 1.
  workflow_dispatch:
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - id: watch
        run: python3 scripts/watch_sources.py
      - if: steps.watch.outputs.changes == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('monitoring/last_report.md','utf8');
            await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo,
              title: `Source change detected — ${new Date().toISOString().slice(0,10)}`, body});
